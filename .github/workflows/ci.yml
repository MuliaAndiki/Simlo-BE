name: Deploy to Back4app

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via API
        run: |
          curl -X POST \
          -H "X-Parse-Application-Id: ${{ secrets.B4A_APP_ID }}" \
          -H "X-Parse-Master-Key: ${{ secrets.B4A_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://parseapi.back4app.com/functions/deployApp
